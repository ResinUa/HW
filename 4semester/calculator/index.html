<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="calculator">
      <input type="text" id="display" disabled/>
      <div class="buttons">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>/</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>*</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>-</button>

        <button>0</button>
        <button>.</button>
        <button>=</button>
        <button>+</button>

        <button>AC</button>
      </div>
    </div>
    <script>
const display = document.getElementById("display");
const buttons = document.querySelectorAll("button");

let bob = "";

buttons.forEach(button => {
    button.addEventListener("click", () =>{
        const value = button.textContent;

        if(value === "AC"){
            bob = "";
            display.value = "";
        }
        else if(value === "="){
            bob = eval(bob);
            display.value = bob;
        }
        else{
            bob += value;
            display.value += value;
        }
    })
})
    </script>
  </body>
</html>
